name: Release DaJet Studio for Linux

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'DaJet version'
        required: true
      description:
        description: 'Release description'
        required: true
env:
  DOTNET_TARGET: 'net10.0'

jobs:
  publish:
    name: build-and-publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout source code
      uses: actions/checkout@v4
      with:
        sparse-checkout: src
        sparse-checkout-cone-mode: false

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'ga'

    - name: Install WASM Tools Workload
      run: dotnet workload install wasm-tools

    - name: Create output directories
      run: |
        mkdir ${{github.workspace}}/publish
        mkdir ${{github.workspace}}/publish/wwwroot

    - name: Publish DaJet HTTP Server
      working-directory: src/app-host
      run: dotnet publish -f ${{env.DOTNET_TARGET}} --os linux -a x64 -c Release -o ${{github.workspace}}/publish -p:PublishSingleFile=true -p:IsWebConfigTransformDisabled=true

    - name: Publish DaJet Studio
      working-directory: src/dajet-studio
      run: |
        dotnet publish -f ${{env.DOTNET_TARGET}} --os linux -a x64 -c Release -o ./bin
        cp -aT ./bin/wwwroot ${{github.workspace}}/publish/wwwroot

    - name: Prepare artifacts
      working-directory: publish
      run: tar czvf "${{github.workspace}}/dajet-studio-${{github.event.inputs.version}}-linux.tar.gz" "."

    - name: Upload artifacts
      uses: softprops/action-gh-release@v2
      with:
        tag_name: 'dajet-studio-${{github.event.inputs.version}}'
        files: ${{github.workspace}}/dajet-studio-${{github.event.inputs.version}}-linux.tar.gz
      env:
        GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
