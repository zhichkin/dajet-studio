name: Deploy DaJet Studio to Docker Hub

on:
  workflow_dispatch:

env:
  DOTNET_TARGET: 'net10.0'
  
jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          sparse-checkout: src
          sparse-checkout-cone-mode: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'

      - name: Install WASM Tools Workload
        run: dotnet workload install wasm-tools

      - name: Create publish directories
        run: |
          mkdir ${{github.workspace}}/publish
          mkdir ${{github.workspace}}/publish/wwwroot
        
      - name: Configure appsettings.json
        uses: microsoft/variable-substitution@v1
        with:
          files: 'src/app-host/appsettings.json'
        env:
          urls: 'http://0.0.0.0:5555'

      - name: Publish DaJet Studio
        working-directory: src/dajet-studio
        run: |
          dotnet publish -f ${{env.DOTNET_TARGET}} --os linux -a x64 -c Release -o ./bin
          cp -aT ./bin/wwwroot ${{github.workspace}}/publish/wwwroot

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}
          
      - name: Publish and push the container image
        working-directory: src/app-host
        run: |
          dotnet publish --os linux --arch x64 -c Release -o ${{github.workspace}}/publish \
            -t:PublishContainer \
            -p:ContainerBaseImage=mcr.microsoft.com/dotnet/aspnet:10.0 \
            -p:ContainerRegistry=docker.io \
            -p:ContainerRepository=zhichkin/dajet-studio
